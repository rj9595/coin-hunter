<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 شکارچی توپ</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:#151515;
  color:#fff;
  text-align:center;
}

h1{color:gold; margin-top:10px; font-family: nazanin; font-size: 35px;}

#info{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin:10px;
}

#profileBox{
  width:min(60vw,320Px);
  margin:12px auto;
  padding:12px 16px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  background: linear-gradient(135deg, #1a1a1a, #111);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius:14px;

  box-shadow:
    0 8px 20px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.05);

  font-size:15px;
  color:#fff;

  backdrop-filter: blur(6px);
  transition: all 0.3s ease;
}

#game{
  width:min(90vw,500px);
  aspect-ratio:1;
  margin:10px auto;
  border:3px solid #fff;
  border-radius:15px;
  position:relative;
  background:#222;
  overflow:hidden;
}

.coin{
  width:40px;
  height:40px;
  border-radius:50%;
  position:absolute;
  cursor:pointer;

  background: radial-gradient(
    circle at 30% 30%,
    #fff8b0 0%,
    #ffd700 30%,
    #ffb300 70%,
    #c88700 100%
  );

  box-shadow:
    inset -4px -4px 8px rgba(0,0,0,0.35),
    inset 3px 3px 6px rgba(255,255,255,0.6),
    0 4px 10px rgba(255,215,0,0.4);
}

button{
  padding:4px 20px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-family:nazanin;
  font-size: 20px;
  background:rgba(199, 145, 10, 0.747);
  color:#fff;
  margin:2px;
}

#nameModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  justify-content:center;
  align-items:center;
}

.modalBox{
  background:#111;
  padding:15px;
  border-radius:15px;
  width:280px;
  box-shadow: 0px 0px 10px 5px rgba(201, 147, 0, 0.377);
}
input{
  width:50%;
  padding:8px;
  margin-top:1px;
  border: 2px solid goldenrod;
  background-color: #444;
  color: #fff;
  transition: width 0.5s ease-in-out;
}
input:focus{
  width: 80%;
}
#leaderboard{
  width:min(90vw,500px);
  margin:10px auto;
  border:1px solid #444;
  box-shadow: 0px 0px 10px 5px rgba(189, 138, 0, 0.15);
  border-radius:10px;
  padding:10px;
}

.score-popup{
  position:absolute;
  color:#FFD700;
  font-size:24px;
  font-weight:bold;
  pointer-events:none;
  text-shadow:0 0 10px gold;
  animation: popup 0.7s forwards;
  z-index:999;
}

@keyframes popup{
  from{
    opacity:1;
    transform:translateY(0);
  }

  to{
    opacity:0;
    transform:translateY(-40px);
  }
}

</style>

</head>

<body>

<h1>🎯 شکارچی توپ</h1>

<div id="info">
  <div>⭐ <span id="score">0</span></div>
  <div>⏱ <span id="time">25</span></div>
  <div>🏆 بهترین امتیاز <span id="highscore">0</span></div>
</div>

<button onclick="startGame()">🎮 شروع بازی</button>
<button onclick="changeName()">✏️ تغییر نام</button>
<button onclick="openFeedback()">💬 حرفی انتقادی</button>

<div id="profileBox">
  <span id="profileName">👤 -</span>
  <span id="profileRank">😮 رتبه: -</span>
</div>

<div id="game"></div>

<div id="leaderboard">
<h3>🏆 برترین بازیکنان</h3>
<div id="board"></div>
</div>

<!-- NAME MODAL -->
<div id="nameModal">
  <div class="modalBox">
    <h3 style="font-size: 35px; font-family: nazanin;">بـرای شـروع</h3>
    <p style="font-size: 25px; font-family: nazanin;">😎اول نـام وارد کـن</p>
    <input id="nameInput" style="font-family: nazanin; font-size: 15px;" placeholder="نام شما">
    <button id="saveName" style="padding: 1px 66px; margin-top: 15px; font-size: 30px;" onclick="saveName()">ثبت</button>
  </div>
</div>

<div id="feedbackModal" style="
     display:none;
     position:fixed;
     inset:0;
     background:rgba(0,0,0,.7);
     justify-content:center;
     align-items:center;
     ">

  <div class="modalBox">
    <h3 style="font-family: nazanin; font-size: 30px;">💬 نظر یا پیشنهاد</h3>

    <textarea
      id="feedbackText"
      placeholder="نظرت رو بنویس..."
      style="
      width:100%;
      height:70px;
      margin-top:10px;
      font-family: nazanin;">
      </textarea>

    <button onclick="sendFeedback()">ارسال✔️</button>
    <button onclick="closeFeedback()">لغو ❌</button>

  </div>
</div>

<script>

const SUPABASE_URL = "https://dceqzskouoblluxrdgoi.supabase.co";
const SUPABASE_KEY = "sb_publishable_OaHzdHhVIezzn49Hf0LGkQ_rzvv7vWQ";

const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_KEY);

// ================= STATE =================
let score = 0;
let timeLeft = 25;
let playerName = "";
let timerInterval;
let moveInterval;

const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");

let highscore = localStorage.getItem("highscore") || 0;
document.getElementById("highscore").textContent = highscore;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// ================== پروفایل =================
function updateProfileBox(data) {

  const profileName = document.getElementById("profileName");
  const profileRank = document.getElementById("profileRank");

  profileName.textContent = `👤 ${playerName}`;

  let rank = "-";

  if (data && data.length) {
    const sorted = [...data].sort((a, b) => b.score - a.score);

    const index = sorted.findIndex(p => p.name === playerName);

    if (index !== -1) {
      rank = index + 1;
    }
  }

  profileRank.textContent = `😮 رتبه: ${rank}`;
}

// ================== نظرات =================
function openFeedback() {
  document.getElementById("feedbackModal").style.display = "flex";
}

function closeFeedback() {
  document.getElementById("feedbackModal").style.display = "none";
}

async function sendFeedback() {

  const text = document
    .getElementById("feedbackText")
    .value
    .trim();

  if (!text) {
    alert("متن خالی است");
    return;
  }

  const { error } = await client
    .from("feedbacks")
    .insert({
      player_name: playerName,
      message: text
    });

  if (error) {
    alert("خطا در ارسال");
    console.log(error);
    return;
  }

  alert("✅ نظر شما ثبت شد");

  document.getElementById("feedbackText").value = "";

  closeFeedback();
}

// ================== Ball Sound =================
function playPopSound() {

  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.type = "sine";

  osc.frequency.setValueAtTime(400, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(
    120,
    audioCtx.currentTime + 0.08
  );

  gain.gain.setValueAtTime(0.50, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(
    0.001,
    audioCtx.currentTime + 0.08
  );

  osc.start();
  osc.stop(audioCtx.currentTime + 0.08);
}

// ================= INIT =================
window.onload = async () => {

  playerName = localStorage.getItem("playerName");

  if (!playerName) {

    document.getElementById("nameModal").style.display = "flex";

    await loadLeaderboard();
    setupRealtimeLeaderboard();

    return;
  }

  const { data } = await client
    .from("players")
    .select("name")
    .eq("name", playerName);

  if (!data || data.length === 0) {

    localStorage.removeItem("playerName");
    localStorage.removeItem("highscore");

    playerName = "";

    document.getElementById("nameModal").style.display = "flex";

    await loadLeaderboard();
    setupRealtimeLeaderboard();

    return;
  }

  await loadLeaderboard();
  setupRealtimeLeaderboard();
};

// ================= SAVE NAME =================
async function saveName() {
  const name = document.getElementById("nameInput").value.trim();
  if (!name) return alert("اسم وارد کن");

  // 1️⃣ بررسی وجود اسم
  const { data: exists, error: checkError } = await client
    .from("players")
    .select("name")
    .eq("name", name)
    .maybeSingle();

  if (checkError) {
    console.log(checkError);
    return;
  }

  // 2️⃣ اگر اسم وجود داشت → خطا بده
  if (exists) {
    alert("❌ این اسم قبلاً انتخاب شده است!");
    return;
  }

  // 3️⃣ اگر نبود → ثبت کن
  const { error } = await client.from("players").insert({
    name,
    score: 0
  });

  if (error) {
    console.log("DB ERROR:", error);
    return;
  }

  // 4️⃣ ذخیره در لوکال
  playerName = name;
  localStorage.setItem("playerName", name);

  document.getElementById("nameModal").style.display = "none";

  await loadLeaderboard();
}

// ================= CHANGE NAME (ONLY SHOW MODAL) =================
function changeName() {
  document.getElementById("nameModal").style.display = "flex";
}

// ================= COIN =================
function moveCoin(c) {
  const rect = game.getBoundingClientRect();
  const size = 40;

  c.style.left = Math.random() * (rect.width - size) + "px";
  c.style.top = Math.random() * (rect.height - size) + "px";
}

function createCoin() {
  game.innerHTML = "";

  const coin = document.createElement("div");
  coin.className = "coin";

  moveCoin(coin);

  // ============ Click COIN ============
  coin.onclick = () => {

    playPopSound();

  const rect = coin.getBoundingClientRect();

  const popup = document.createElement("div");

  popup.className = "score-popup";
  popup.textContent = "+1";

  popup.style.position = "fixed";
  popup.style.left = (rect.left + rect.width / 2 - 10) + "px";
  popup.style.top = rect.top + "px";

  document.body.appendChild(popup);

  setTimeout(() => {
    popup.remove();
  }, 700);

  score++;
  scoreEl.textContent = score;

  createCoin();
};

  game.appendChild(coin);

  clearInterval(moveInterval);
  moveInterval = setInterval(() => moveCoin(coin), 800);
}

// ================= START GAME =================
async function startGame() {

  playerName = localStorage.getItem("playerName");

  if (!playerName) {
    document.getElementById("nameModal").style.display = "flex";
    return;
  }

  // 🔥 چک واقعی در دیتابیس
  const { data } = await client
    .from("players")
    .select("name")
    .eq("name", playerName);

  // اگر وجود نداشت → اجازه بازی نده
  if (!data || data.length === 0) {
    alert("کاربر معتبر نیست، لطفاً دوباره ثبت نام کن");

    localStorage.removeItem("playerName");

    document.getElementById("nameModal").style.display = "flex";
    return;
  }

  // ================= شروع بازی =================
  score = 0;
  timeLeft = 25;

  scoreEl.textContent = 0;
  timeEl.textContent = 25;

  createCoin();

  clearInterval(timerInterval);

  timerInterval = setInterval(async () => {
    timeLeft--;
    timeEl.textContent = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      clearInterval(moveInterval);
      game.innerHTML = "";

      const finalScore = Number(score);

      await saveScore(finalScore);
      await loadLeaderboard();

      if (finalScore > highscore) {
        highscore = finalScore;
        localStorage.setItem("highscore", finalScore);
        document.getElementById("highscore").textContent = finalScore;
      }
    }
  }, 1000);
}

// ================= SAVE SCORE (BEST SCORE ONLY) =================
async function saveScore(finalScore) {

  const { data } = await client
    .from("players")
    .select("score")
    .eq("name", playerName);

  const oldScore = data?.[0]?.score ?? 0;

  const bestScore = Math.max(finalScore, oldScore);

  const { error } = await client
    .from("players")
    .upsert({
      name: playerName,
      score: bestScore
    }, {
      onConflict: "name"
    });

  if (error) {
    console.log("DB ERROR:", error);
  }
}

// ================= LEADERBOARD =================


async function loadLeaderboard() {

  // 1️⃣ گرفتن Top 10 برای نمایش لیست
  const { data: top10 } = await client
    .from("players")
    .select("*")
    .order("score", { ascending: false })
    .limit(10);

  // 2️⃣ گرفتن کل دیتا فقط برای محاسبه رتبه
  const { data: allPlayers } = await client
    .from("players")
    .select("*")
    .order("score", { ascending: false });

  const board = document.getElementById("board");
  board.innerHTML = "";

  // ===== نمایش لیست =====
  (top10 || []).forEach((p, i) => {

    const rank = i + 1;

    let medal = "";
    let color = "#aaa";

    if (rank === 1) {
      medal = "🥇";
      color = "#FFD700";
    } 
    else if (rank === 2) {
      medal = "🥈";
      color = "#C0C0C0";
    } 
    else if (rank === 3) {
      medal = "🥉";
      color = "#CD7F32";
    }

    const row = document.createElement("div");

    row.style.cssText = `
      display:flex;
      justify-content:center;
      gap:10px;
      padding:6px;
      margin:4px;
      border-radius:10px;
      transition: all 0.4s ease;
      transform: translateY(10px);
      opacity: 0;
      color: ${color};
      font-weight: ${rank <= 3 ? "bold" : "normal"};
    `;

    row.innerHTML = `
      <span>${medal ? medal : `#${rank}`}</span>
      <b>${p.name}</b>
      <span>⭐ ${p.score}</span>
    `;

    board.appendChild(row);

    setTimeout(() => {
      row.style.transform = "translateY(0)";
      row.style.opacity = "1";
    }, 50 * i);
  });

  // 3️⃣ آپدیت پروفایل با کل دیتا (نه فقط top10)
  updateProfileBox(allPlayers);
}


// ================= REALTIME (TRUE EVENT-BASED) =================

let leaderboardChannel = null;

function setupRealtimeLeaderboard() {

  // جلوگیری از اتصال تکراری
  if (leaderboardChannel) {
    client.removeChannel(leaderboardChannel);
  }

  leaderboardChannel = client
    .channel('players-live')
    .on(
      'postgres_changes',
      {
        event: '*', // INSERT / UPDATE / DELETE
        schema: 'public',
        table: 'players'
      },
      (payload) => {
        loadLeaderboard(); // 🔥 فقط وقتی واقعاً دیتا تغییر کرد
      }
    )
    .subscribe();
}


// ================= MOBILE + TAB FIX =================

// وقتی برمی‌گردی به صفحه (گوشی/کامپیوتر)
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) {
    loadLeaderboard();
  }
});

</script>

</body>
</html>
