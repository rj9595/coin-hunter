<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 شکارچی توپ</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:#151515;
  color:#fff;
  text-align:center;
}

h1{color:gold; margin-top:10px; font-family: nazanin; font-size: 35px;}

#info{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin:10px;
}

#profileBox{
  width:90%;
  max-width:420px;
  margin:10px auto;
  padding:10px 12px;

  display:flex;
  justify-content:center; 
  align-items:center;
  gap:12px; 

  box-sizing:border-box;

  background: linear-gradient(135deg, #1a1a1a, #111);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius:14px;

  box-shadow:
    0 8px 20px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.05);

  color:#fff;
  font-size:13px; 
  backdrop-filter: blur(6px);
}

.profileCard{
  display:flex;
  align-items:center;
  gap:8px;

  flex:0 1 auto; /* مهم */
  min-width:0;
}

.profileCard.left{
  justify-content:flex-start;
}

.profileCard.right{
  justify-content:flex-start;
}

#profileName{
  font-weight:bold;
  max-width:110px;
}

/* 📱 موبایل */
@media (max-width:480px){

  #profileBox{
    padding:10px;
    gap:10px;
  }

  .profileCard{
    gap:7px;
    font-size:13px;
  }

  #profileName{
    max-width:90px;
  }

  #profileLevel,
  #profileXP,
  #profileRankScore,
  #profileRankLevel{
    font-size:12px;
  }
}

#game{
  width:min(90vw,500px);
  aspect-ratio:1;
  margin:10px auto;
  border:3px solid #fff;
  border-radius:15px;
  position:relative;
  background:#222;
  overflow:hidden;
}

.coin{
  width:40px;
  height:40px;
  border-radius:50%;
  position:absolute;
  cursor:pointer;

  background: radial-gradient(
    circle at 30% 30%,
    #fff8b0 0%,
    #ffd700 30%,
    #ffb300 70%,
    #c88700 100%
  );

  box-shadow:
    inset -4px -4px 8px rgba(0,0,0,0.35),
    inset 3px 3px 6px rgba(255,255,255,0.6),
    0 4px 10px rgba(255,215,0,0.4);
}

.fireCoin{
  background: radial-gradient(circle, #ffcc00 0%, #ff6600 50%, #ff0000 100%);
  box-shadow: 0 0 15px #ff6600;
}

.diamondCoin{
  background: radial-gradient(circle, #ffffff 0%, #66e0ff 40%, #0099ff 100%);
  box-shadow: 0 0 20px #00ccff;
}

button{
  padding:4px 11px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-family:nazanin;
  font-size: 15px;
  background:rgba(199, 145, 10, 0.747);
  color:#fff;
  margin:1px;
}

#nameModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  justify-content:center;
  align-items:center;
}

.modalBox{
  background:#111;
  padding:15px;
  border-radius:15px;
  width:280px;
  box-shadow: 0px 0px 10px 5px rgba(201, 147, 0, 0.377);
}

input{
  width:50%;
  padding:8px;
  margin-top:1px;
  border: 2px solid goldenrod;
  background-color: #444;
  color: #fff;
  transition: width 0.5s ease-in-out;
}

input:focus{
  width: 80%;
}

#leaderboards{
  width:100%;
  max-width:520px;
  margin:10px auto;

  display:flex;
  flex-direction:row;
  justify-content:center;
  align-items:stretch;

  gap:8px;
  padding:0 8px;

  box-sizing:border-box;
}

/* هر جدول */
.board{
  flex:1;               /* 🔥 مهم‌ترین تغییر */
  min-width:0;

  background:#1a1a1a;
  border-radius:12px;
  padding:10px;

  color:white;
  font-size:clamp(11px, 2.5vw, 13px);

  overflow:hidden;

  box-shadow:0 6px 16px rgba(0,0,0,0.3);
}

/* عنوان */
.board h3{
  font-family: nazanin;
  font-size:clamp(14px, 3vw, 18px);
  margin:0 0 8px 0;
  text-align:center;
  color:#ffd700;
}

/* آیتم‌ها */
.board div{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  padding:4px 0;

  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* 📱 موبایل */
@media (max-width: 480px){

  #leaderboards{
    gap:6px;
    padding:0 6px;
  }

  .board{
    padding:8px;
  }

  .board h3{
    font-size:14px;
  }
}

.score-popup{
  position:absolute;
  color:#FFD700;
  font-size:24px;
  font-weight:bold;
  pointer-events:none;
  text-shadow:0 0 10px gold;
  animation: popup 0.7s forwards;
  z-index:999;
}

@keyframes popup{
  from{
    opacity:1;
    transform:translateY(0);
  }

  to{
    opacity:0;
    transform:translateY(-40px);
  }
}

.stageMessage{
  position:fixed;
  top:35%;
  left:50%;
  transform:translate(-50%,-70%);
  font-size:32px;
  font-weight:bold;
  pointer-events:none;
  z-index:9999;

  animation:stageFade 3s forwards;
}

@keyframes stageFade{
  0%{
    opacity:0;
    transform:translate(-50%,-50%) scale(0.7);
  }

  20%{
    opacity:1;
    transform:translate(-50%,-50%) scale(1.1);
  }

  80%{
    opacity:1;
  }

  100%{
    opacity:0;
    transform:translate(-50%,-80%) scale(1);
  }
}

@keyframes shake {
  0% { transform: translate(0, 0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(-2px, -2px); }
  60% { transform: translate(2px, 2px); }
  80% { transform: translate(2px, -2px); }
  100% { transform: translate(0, 0); }
}

.shake{
  animation: shake 0.3s;
}

#xpContainer{
  width:100%;
  max-width:420px;
  margin:10px auto;

  padding:10px;

  box-sizing:border-box;
}

#xpInfo{
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
  font-size:20px;
  margin-bottom:5px;
}

#xpBar{
  width:100%;
  height:12px;
  background:#222;
  border-radius:999px;
  overflow:hidden;
  box-shadow:
    inset 0 2px 4px rgba(0,0,0,.4);
}

#xpFill{
  width:0%;
  height:100%;
  border-radius:999px;
  background:linear-gradient(
    90deg,
    #00e5ff,
    #00ff95
  );
  transition:width .35s ease;
}

</style>

</head>

<body>

<h1>🎯 شکارچی توپ</h1>

<div id="info">
  <div>⭐ <span id="score">0</span></div>
  <div>⏱ <span id="time">30</span></div>
  <div>🏆 بهترین امتیاز <span id="highscore">0</span></div>
</div>

<button onclick="startGame()">🎮 شروع بازی</button>
<button onclick="changeName()">✏️ تغییر نام</button>
<button onclick="openFeedback()">💬 نظرات</button>

<div id="profileBox">

  <div class="profileCard left">
    <span id="profileName" style="padding-left: 19px;">👤 -</span>
    <span id="profileLevel">Level: -</span>
  </div>

  <div class="profileCard right">
    <span id="profileRankScore">🏆 رتبه امتیاز: -</span>
    <span id="profileRankLevel">📊 رتبه لول: -</span>
  </div>

</div>

<div id="game"></div>

<div id="xpContainer">

  <div id="xpInfo">
    <span id="profileXP">0 / 100 XP</span>
  </div>

  <div id="xpBar">
    <div id="xpFill"></div>
  </div>

</div>

<div id="leaderboards">

  <!-- 📊 Left: Top Level -->
  <div class="board">
    <h3>📊 بالاترین لول</h3>
    <div id="levelBoard" style="font-size: 15px;"></div>
  </div>

  <!-- 🏆 Right: Top Score -->
  <div class="board">
    <h3>🏆 بهترین امتیاز</h3>
    <div id="scoreBoard" style="font-size: 15px;"></div>
  </div>

</div>

<!-- NAME MODAL -->
<div id="nameModal">
  <div class="modalBox">
    <h3 style="font-size: 35px; font-family: nazanin;">بـرای شـروع</h3>
    <p style="font-size: 25px; font-family: nazanin;">😎اول نـام وارد کـن</p>
    <input id="nameInput" style="font-family: nazanin; font-size: 15px;" placeholder="نام شما">
    <button id="saveName" style="padding: 1px 66px; margin-top: 15px; font-size: 30px;" onclick="saveName()">ثبت</button>
  </div>
</div>

<div id="feedbackModal" style="
     display:none;
     position:fixed;
     inset:0;
     background:rgba(0,0,0,.7);
     justify-content:center;
     align-items:center;
     ">

  <div class="modalBox">
    <h3 style="font-family: nazanin; font-size: 30px;">💬 نظر یا پیشنهاد</h3>

    <textarea
      id="feedbackText"
      placeholder="نظرت رو بنویس..."
      style="
      width:100%;
      height:70px;
      margin-top:10px;
      font-family: nazanin;">
      </textarea>

    <button onclick="sendFeedback()">ارسال✔️</button>
    <button onclick="closeFeedback()">لغو ❌</button>

  </div>
</div>

<script>

const SUPABASE_URL = "https://dceqzskouoblluxrdgoi.supabase.co";
const SUPABASE_KEY = "sb_publishable_OaHzdHhVIezzn49Hf0LGkQ_rzvv7vWQ";

const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_KEY);

// ================= STATE =================
let score = 0;
let timeLeft = 25;
let playerName = "";
let timerInterval;
let moveInterval;
let xp = 0;
let level = 1;
let currentCoin = null;
let fireShown = false;
let diamondShown = false;

const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const scoreBoard = document.getElementById("scoreBoard");
const levelBoard = document.getElementById("levelBoard");
const coin = document.getElementById("coin");

let highscore = localStorage.getItem("highscore") || 0;
document.getElementById("highscore").textContent = highscore;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// ================== پروفایل =================
function updateProfileBox(data) {

  const profileName = document.getElementById("profileName");
  const profileLevel = document.getElementById("profileLevel");
  const profileXP = document.getElementById("profileXP");

  const profileRankScore = document.getElementById("profileRankScore");
  const profileRankLevel = document.getElementById("profileRankLevel");

  if (
    !profileName ||
    !profileLevel ||
    !profileXP ||
    !profileRankScore ||
    !profileRankLevel
  ) {
    console.error("❌ Profile elements not found");
    return;
  }

  profileName.textContent = `👤 ${playerName}`;

  let scoreRank = "-";
  let levelRank = "-";

  if (data && data.length) {

    const me = data.find(p => p.name === playerName);

    if (me) {

      const sortedScore = [...data].sort((a, b) => b.score - a.score);
      scoreRank = sortedScore.findIndex(p => p.name === playerName) + 1;

      const sortedLevel = [...data].sort((a, b) => b.level - a.level);
      levelRank = sortedLevel.findIndex(p => p.name === playerName) + 1;
    }
  }

  // 🔥 استفاده از مقادیر زنده بازی
  profileLevel.textContent = `Level: ${level}`;
  profileXP.textContent = `⚡ XP: ${xp}`;

  profileRankScore.textContent =
    `🏆 رتبه امتیاز: ${scoreRank}`;

  profileRankLevel.textContent =
    `📊 رتبه لول: ${levelRank}`;
}

// ================== getPlayerId =================
function getPlayerId() {

  let id = localStorage.getItem("playerId");

  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("playerId", id);
  }

  return id;
}

// ================== نظرات =================
function openFeedback() {
  document.getElementById("feedbackModal").style.display = "flex";
}

function closeFeedback() {
  document.getElementById("feedbackModal").style.display = "none";
}

async function sendFeedback() {

  const text = document
    .getElementById("feedbackText")
    .value
    .trim();

  if (!text) {
    alert("متن خالی است");
    return;
  }

  const { error } = await client
    .from("feedbacks")
    .insert({
      player_name: playerName,
      message: text
    });

  if (error) {
    alert("خطا در ارسال");
    console.log(error);
    return;
  }

  alert("✅ نظر شما ثبت شد");

  document.getElementById("feedbackText").value = "";

  closeFeedback();
}

// ================== Ball Sound =================
function playPopSound() {

  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.type = "sine";

  osc.frequency.setValueAtTime(400, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(
    120,
    audioCtx.currentTime + 0.08
  );

  gain.gain.setValueAtTime(0.50, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(
    0.001,
    audioCtx.currentTime + 0.08
  );

  osc.start();
  osc.stop(audioCtx.currentTime + 0.08);
}

// ================= INIT =================
window.onload = async () => {

  playerName = localStorage.getItem("playerName");

  if (!playerName) {
    document.getElementById("nameModal").style.display = "flex";
    return;
  }

  // 🚀 سریع لود بازی (بدون صبر)
  loadLeaderboard();
  setupRealtimeLeaderboard();

  // 🔍 چک کاربر در پس‌زمینه (بدون قفل کردن UI)
  (async () => {
    const { data } = await client
      .from("players")
      .select("name")
      .eq("name", playerName);

    if (!data || data.length === 0) {
      localStorage.removeItem("playerName");
      document.getElementById("nameModal").style.display = "flex";
    }
  })();

};

// ================= SAVE NAME =================
async function saveName() {

  const name = document.getElementById("nameInput").value.trim();
  if (!name) return alert("اسم وارد کن");

  const playerId = getPlayerId();

  // ❌ اسم تکراری نباشه
  const { data: exists } = await client
    .from("players")
    .select("*")
    .eq("name", name)
    .maybeSingle();

  if (exists) {
    alert("❌ این اسم قبلاً انتخاب شده است!");
    return;
  }

  // 🔥 گرفتن دیتا قبلی (خیلی مهم)
  const { data: oldData } = await client
    .from("players")
    .select("*")
    .eq("id", playerId)
    .maybeSingle();

  const { error } = await client
    .from("players")
    .upsert({
      id: playerId,
      name: name,

      // 💥 حفظ کامل دیتا قبلی
      score: oldData?.score ?? 0,
      xp: oldData?.xp ?? 0,
      level: oldData?.level ?? 1
    }, {
      onConflict: "id"
    });

  if (error) {
    console.log("DB ERROR:", error);
    return;
  }

  playerName = name;
  localStorage.setItem("playerName", name);

  document.getElementById("nameModal").style.display = "none";

  await loadLeaderboard();
}

// ================= CHANGE NAME (ONLY SHOW MODAL) =================
function changeName() {
  document.getElementById("nameModal").style.display = "flex";
}

// ================= نمایش پیام مرحله =================
function showStageMessage(text) {

  const msg = document.createElement("div");

  msg.className = "stageMessage";
  msg.textContent = text;

  document.body.appendChild(msg);

  setTimeout(() => {
    msg.remove();
  }, 3000);

}

// ================= COIN =================
function moveCoin(c) {
  const rect = game.getBoundingClientRect();
  const size = 40;

  c.style.left = Math.random() * (rect.width - size) + "px";
  c.style.top = Math.random() * (rect.height - size) + "px";
}

function createCoin() {
  game.innerHTML = "";

  const coin = document.createElement("div");
  coin.className = "coin";

  currentCoin = coin;

  // 🔥 حالت‌ها
  if (score >= 50) {
    coin.classList.add("diamondCoin");
  } else if (score >= 40) {
    coin.classList.add("fireCoin");
  }

  moveCoin(coin);

  // ================= CLICK COIN =================
  coin.onclick = () => {

    if (score >= 50) {
      playDiamondSound();
    } else if (score >= 40) {
      playFireSound();
    } else {
      playPopSound();
    }

    const rect = coin.getBoundingClientRect();

    const popup = document.createElement("div");
    popup.className = "score-popup";
    popup.textContent = "+1";

    popup.style.position = "fixed";
    popup.style.left = (rect.left + rect.width / 2 - 10) + "px";
    popup.style.top = rect.top + "px";

    document.body.appendChild(popup);

    setTimeout(() => {
      popup.remove();
    }, 700);

    // ================= SCORE =================
    score++;
    scoreEl.textContent = score;

    // ================= XP / LEVEL =================
    xp++;
    updateLevel();

    // ================= STAGES =================
    if (score >= 40 && !fireShown) {
      fireShown = true;
      showStageMessage("🔥 بالای 40 امیتاز");
      shakeGame();
      playFireSound();
    }

    if (score >= 50 && !diamondShown) {
      diamondShown = true;
      showStageMessage("💎 بالای 50 امتیاز");
      shakeGame();
      playDiamondSound();
    }

    createCoin();
  };

  game.appendChild(coin);

  clearInterval(moveInterval);
  moveInterval = setInterval(() => moveCoin(coin), 800);
}

// ================= loadPlayerData =================
async function loadPlayerData() {

  const playerId = getPlayerId();

  const { data } = await client
    .from("players")
    .select("*")
    .eq("id", playerId)
    .maybeSingle();

  if (data) {

    score = data.score || 0;
    xp = data.xp || 0;
    level = data.level || 1;

    playerName = data.name; // 🔥 مهم: sync اسم واقعی

    profileName.textContent = `👤 ${data.name}`;

    updateLevel();
  }
}

// ================= START GAME =================
async function startGame() {

  playerName = localStorage.getItem("playerName");

  if (!playerName) {
    document.getElementById("nameModal").style.display = "flex";
    return;
  }

  // 🔥 چک واقعی در دیتابیس
  const { data } = await client
    .from("players")
    .select("name")
    .eq("name", playerName);

  // اگر وجود نداشت → اجازه بازی نده
  if (!data || data.length === 0) {
    alert("کاربر معتبر نیست، لطفاً دوباره ثبت نام کن");

    localStorage.removeItem("playerName");

    document.getElementById("nameModal").style.display = "flex";
    return;
  }
    await loadPlayerData();

  // ================= شروع بازی =================
  score = 0;
  timeLeft = 30;

  fireShown = false;
  diamondShown = false;

  scoreEl.textContent = 0;
  timeEl.textContent = 30;
  timeEl.style.color = "white";

  createCoin();

  clearInterval(timerInterval);

  timerInterval = setInterval(async () => {
    timeLeft--;
    timeEl.textContent = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      clearInterval(moveInterval);
      game.innerHTML = "";

      const finalScore = Number(score);

      await saveScore(finalScore);
      await loadLeaderboard();

      if (finalScore > highscore) {
        highscore = finalScore;
        localStorage.setItem("highscore", finalScore);
        document.getElementById("highscore").textContent = finalScore;
      }
    }
  }, 1000);
}

// ================= updateLevel =================
function updateLevel() {

  const nextLevelXP = level * 100;

  // 🔥 لول آپ
  if (xp >= nextLevelXP) {

    level++;

    xp = 0; // 💥 ریست XP فقط اینجا

    showStageMessage("⬆️ لول بالا!");
    shakeGame();
  }

  const newNextLevelXP = level * 100;

  profileLevel.textContent = `Level ${level}`;
  profileXP.textContent = `⚡ ${xp}/${newNextLevelXP}`;

  // ================= XP BAR FIX =================

  const xpFill = document.getElementById("xpFill");

  if (xpFill) {

    const progress = (xp / newNextLevelXP) * 100;

    xpFill.style.width = `${Math.max(0, Math.min(progress, 100))}%`;
  }
}

  // ================= XP BAR =================

const xpFill = document.getElementById("xpFill");

if (xpFill) {

  const nextLevelXP = level * 100;   // 🔥 XP مورد نیاز این لول
  const currentXP = xp;              // XP داخل لول (ریست شده)

  const progress = (currentXP / nextLevelXP) * 100;

  xpFill.style.width = `${Math.max(0, Math.min(progress, 100))}%`;
}

// ================= SAVE SCORE (BEST SCORE ONLY) =================
async function saveScore(finalScore) {

  const playerId = getPlayerId();

  const { data } = await client
    .from("players")
    .select("score")
    .eq("id", playerId);

  const oldScore = data?.[0]?.score ?? 0;

  const bestScore = Math.max(finalScore, oldScore);

  const { error } = await client
    .from("players")
    .upsert({
      id: playerId,
      name: playerName,
      score: bestScore,
      xp: xp,
      level: level
    }, {
      onConflict: "id"
    });

  if (error) {
    console.log("DB ERROR:", error);
  }
}

// ================= LEADERBOARD =================
async function loadLeaderboard() {

  const { data: top10, error: e1 } = await client
    .from("players")
    .select("name,score,level,xp")
    .order("score", { ascending: false })
    .limit(10);

  const { data: topLevel, error: e2 } = await client
    .from("players")
    .select("name,score,level,xp")
    .order("level", { ascending: false })
    .limit(10);

  // 👇 فقط برای محاسبه رتبه واقعی پروفایل
  
  const { data: allPlayers } = await client
    .from("players")
    .select("name,score,level,xp")

// ================= REALTIME (TRUE EVENT-BASED) =================

let leaderboardChannel = null;

function setupRealtimeLeaderboard() {

  // جلوگیری از اتصال تکراری
  if (leaderboardChannel) {
    client.removeChannel(leaderboardChannel);
  }

  leaderboardChannel = client
    .channel('players-live')
    .on(
      'postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'players'
      },
      (payload) => {
        loadLeaderboard();
      }
    )
    .subscribe();
}

document.addEventListener("visibilitychange", () => {

// ================= SHAKE =================
function shakeGame(){
  game.classList.add("shake");

  setTimeout(() => {
    game.classList.remove("shake");
  }, 300);
}

function playFireSound(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "square";
  osc.frequency.value = 130;

  gain.gain.value = 0.08;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();

  osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

  osc.stop(audioCtx.currentTime + 0.2);
}

function playDiamondSound(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = 880;

  gain.gain.value = 0.1;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();

  osc.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.15);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);

  osc.stop(audioCtx.currentTime + 0.15);
}

  await loadPlayerData();
